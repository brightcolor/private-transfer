services:
  app:
    build:
      context: .
      target: app
    env_file: .env
    depends_on:
      - postgres
      - redis
    volumes:
      - type: bind
        source: ${PRIVATE_TRANSFER_STORAGE_DIR:-/opt/private-transfer/storage}
        target: /var/www/html/storage

  nginx:
    build:
      context: .
      target: web
    depends_on:
      - app
    ports:
      - "${PRIVATE_TRANSFER_HTTP_PORT:-8080}:80"
    volumes:
      - type: bind
        source: ${PRIVATE_TRANSFER_STORAGE_DIR:-/opt/private-transfer/storage}
        target: /var/www/html/storage

  worker:
    build:
      context: .
      target: app
    command: php artisan queue:work --sleep=1 --tries=3 --timeout=3600
    env_file: .env
    depends_on:
      - postgres
      - redis
    volumes:
      - type: bind
        source: ${PRIVATE_TRANSFER_STORAGE_DIR:-/opt/private-transfer/storage}
        target: /var/www/html/storage

  scheduler:
    build:
      context: .
      target: app
    command: sh -c "while true; do php artisan schedule:run --no-interaction; sleep 60; done"
    env_file: .env
    depends_on:
      - postgres
      - redis
    volumes:
      - type: bind
        source: ${PRIVATE_TRANSFER_STORAGE_DIR:-/opt/private-transfer/storage}
        target: /var/www/html/storage

  postgres:
    image: postgres:17-alpine
    environment:
      POSTGRES_DB: private_transfer
      POSTGRES_USER: private_transfer
      POSTGRES_PASSWORD: private_transfer
    volumes:
      - type: bind
        source: ${PRIVATE_TRANSFER_POSTGRES_DIR:-/opt/private-transfer/postgres}
        target: /var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U private_transfer"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
